<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Text to Video Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      color: #fff;
    }
    .card {
      background: #1e293b;
      border: none;
      border-radius: 15px;
    }
    textarea {
      background: #0f172a !important;
      color: #fff !important;
      border: 1px solid #334155 !important;
    }
    .btn-custom {
      background: linear-gradient(45deg, #6366f1, #06b6d4);
      border: none;
    }
    .loader {
      display: none;
    }
  </style>
</head>

<body>

<div class="container py-5">

  <div class="text-center mb-5">
    <h1>🚀 AI Text to Video Generator</h1>
    <p>Bikin 100 Video Viral per Hari (Auto)</p>
  </div>

  <div class="card p-4 shadow-lg">

    <label class="mb-2">Masukkan Script / Narasi</label>
    <textarea id="script" class="form-control" rows="5"
      placeholder="Contoh: Lu pernah ngerasa hidup makin susah?..."></textarea>

    <div class="row mt-3">
      <div class="col-md-4">
        <label>Durasi</label>
        <select id="duration" class="form-control">
          <option value="15">15 Detik</option>
          <option value="30">30 Detik</option>
        </select>
      </div>

      <div class="col-md-4">
        <label>Style Video</label>
        <select id="style" class="form-control">
          <option value="motivasi">Motivasi</option>
          <option value="story">Storytelling</option>
          <option value="dark">Dark Content</option>
        </select>
      </div>

      <div class="col-md-4">
        <label>Voice</label>
        <select id="voice" class="form-control">
          <option value="male">Male Indonesia</option>
        </select>
      </div>
    </div>

    <button onclick="generateVideo()" class="btn btn-custom w-100 mt-4 py-3">
      🎬 Generate Video
    </button>

    <div class="text-center mt-4 loader" id="loader">
      <div class="spinner-border text-info"></div>
      <p class="mt-2">Generating video... sabar bro 🔥</p>
    </div>

    <div class="mt-4 text-center" id="result"></div>

  </div>

  <div class="text-center mt-5">
    <small>© 2026 AI Content Machine</small>
  </div>

</div>

<script>
async function generateVideo() {
  const script = document.getElementById("script").value;
  const duration = document.getElementById("duration").value;
  const style = document.getElementById("style").value;
  const voice = document.getElementById("voice").value;

  if (!script) {
    alert("Isi script dulu bro!");
    return;
  }

  document.getElementById("loader").style.display = "block";
  document.getElementById("result").innerHTML = "";

  try {
    const res = await fetch("http://localhost:8000/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: script,
        duration: duration,
        style: style,
        voice: voice
      })
    });

    const data = await res.json();

    document.getElementById("loader").style.display = "none";

    document.getElementById("result").innerHTML = `
      <h5>✅ Video Berhasil Dibuat</h5>
      <video controls width="300" class="mt-3">
        <source src="${data.video}" type="video/mp4">
      </video>
      <p class="mt-2">${data.video}</p>
    `;

  } catch (err) {
    document.getElementById("loader").style.display = "none";
    alert("Error: " + err);
  }
}
</script>

</body>
</html>
