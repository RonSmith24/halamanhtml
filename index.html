<script>
async function generateVideo() {
  const script = document.getElementById("script").value;

  if (!script) {
    alert("Isi script dulu!");
    return;
  }

  const result = document.getElementById("result");

  // 🎤 TEXT TO SPEECH (browser)
  const utterance = new SpeechSynthesisUtterance(script);
  utterance.lang = "id-ID";

  speechSynthesis.speak(utterance);

  // 🎬 SIMULASI VIDEO (pakai background + text)
  result.innerHTML = `
    <div style="
      width:300px;
      height:500px;
      background:black;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      border-radius:10px;
      text-align:center;
      font-size:18px;
    ">
      ${script}
    </div>
    <p class="mt-2">🎧 Sedang diputar dengan suara</p>
  `;
}
</script>
