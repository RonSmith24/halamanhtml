  <style>
    body {
      background: #0f172a;
      color: #fff;
    }

      border-radius: 15px;

    textarea {
      background: #0f172a !important;

    }
    .btn-custom {
      background: linear-gradient(45deg, #6366f1, #06b6d4);
      border: none;
      color: #fff;
    }
    #videoPreview {
      width: 100%;
      height: 500px;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 20px;
      line-height: 1.5;
    }
  </style>

</head>

<body>

<div class="container py-5">

  <div class="text-center mb-5">
    <h1>🚀 AI Text to Video Generator</h1>
    <p>Bikin konten viral cepat tanpa backend</p>
  </div>

  <div class="card p-4 shadow-lg">

```
<label class="mb-2">Masukkan Script</label>
<textarea id="script" class="form-control" rows="5"
  placeholder="Contoh: Lu pernah ngerasa hidup makin susah?..."></textarea>

<div class="row mt-3">
  <div class="col-md-4">
    <label>Durasi</label>
    <select id="duration" class="form-control">
      <option value="15">15 Detik</option>
      <option value="30">30 Detik</option>
    </select>
  </div>

  <div class="col-md-4">
    <label>Style</label>
    <select id="style" class="form-control">
      <option value="motivasi">Motivasi</option>
      <option value="story">Story</option>
      <option value="dark">Dark</option>
    </select>
  </div>

  <div class="col-md-4">
    <label>Voice</label>
    <select id="voice" class="form-control">

      <option value="en-US">English</option>
    </select>

```

  </div>

</div>

<script>
function generateVideo() {
  const text = document.getElementById("script").value.trim();
  const style = document.getElementById("style").value;
  const voiceLang = document.getElementById("voice").value;

  if (!text) {
    alert("Isi script dulu bro!");
    return;
  }

  // 🎨 Style warna
  let bg = "#000";
  if (style === "motivasi") bg = "#1e3a8a";
  if (style === "story") bg = "#065f46";
  if (style === "dark") bg = "#000";

  // 🎬 Preview Video
  document.getElementById("result").innerHTML = `
    <div id="videoPreview" style="background:${bg}">
      ${text}
    </div>
    <p class="mt-2">🎧 Sedang diputar...</p>
  `;

  // 🔊 Voice (Text-to-Speech)
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = voiceLang;
  speech.rate = 0.95;
  speech.pitch = 1;

  speechSynthesis.cancel(); // stop sebelumnya
  speechSynthesis.speak(speech);
}
</script>

</body>
</html>
