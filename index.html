<body>

<div class="container py-5">
  <h2 class="text-center mb-4">🚀 AI YouTube Shorts Generator</h2>

  <div class="card p-4">
    <textarea id="script" class="form-control" rows="5"
    placeholder="Pisahkan kalimat dengan titik.
Contoh:
Lu pernah ngerasa hidup makin berat?
Padahal lo udah berusaha?
Tenang... Allah lagi nguji lo."></textarea>

<button onclick="start()" class="btn btn-primary mt-3 w-100">
  🎬 Generate Video

  </div>
</div>

<script>
let recorder, chunks=[];

async function start() {
  const text = document.getElementById("script").value.trim();
  if (!text) return alert("Isi script dulu!");

  const scenes = text.split(".").map(s => s.trim()).filter(s => s);

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const stream = canvas.captureStream(30);
  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    const blob = new Blob(chunks, {type:'video/webm'});
    const url = URL.createObjectURL(blob);

    document.getElementById("result").innerHTML = `
      <h5>✅ Video Siap</h5>
      <video controls width="300">
        <source src="${url}" type="video/webm">
      </video><br><br>
      <a href="${url}" download="shorts.webm" class="btn btn-success">
        ⬇️ Download
      </a>
    `;
  };

  recorder.start();

  await playScenes(ctx, scenes);

  recorder.stop();
}

async function playScenes(ctx, scenes) {
  for (let i=0;i<scenes.length;i++) {
    await renderScene(ctx, scenes[i]);
    await speak(scenes[i]);
  }
}

function renderScene(ctx, text) {
  return new Promise(resolve => {
    let frame = 0;

    function draw() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0,0,1080,1920);

      // animasi scale
      let scale = 1 + Math.sin(frame*0.05)*0.05;

      ctx.save();
      ctx.translate(540,960);
      ctx.scale(scale,scale);

      ctx.fillStyle = "white";
      ctx.font = "bold 60px Arial";
      ctx.textAlign = "center";

      wrapText(ctx, text, 0, 0, 800, 80);

      ctx.restore();

      frame++;

      if (frame < 90) {
        requestAnimationFrame(draw);
      } else {
        resolve();
      }
    }

    draw();
  });
}

function speak(text) {
  return new Promise(resolve => {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "id-ID";
    speech.rate = 0.95;

    speech.onend = resolve;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);
  });
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "";
  let lines = [];

  for (let n=0;n<words.length;n++) {
    let testLine = line + words[n] + " ";
    let width = ctx.measureText(testLine).width;

    if (width > maxWidth && n>0) {
      lines.push(line);
      line = words[n] + " ";
    } else {
      line = testLine;
    }
  }
  lines.push(line);

  let startY = y - (lines.length * lineHeight)/2;

  lines.forEach((l,i)=>{
    ctx.fillText(l, x, startY + i*lineHeight);
  });
}
</script>

</body>
</html>
